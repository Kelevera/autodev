<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}autodev{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body class="min-h-full bg-slate-950 text-slate-200 antialiased">
  <nav class="border-b border-slate-800 bg-slate-900/80 backdrop-blur">
    <div class="mx-auto flex max-w-6xl items-center gap-6 px-6 py-4">
      <a href="/dashboard" class="flex items-center gap-2 text-lg font-semibold text-white">
        <span class="inline-block h-2.5 w-2.5 rounded-full bg-emerald-400"></span>
        autodev
      </a>
      <span class="text-sm text-slate-500">the self-improving codebase</span>
      <div class="ml-auto flex items-center gap-4 text-sm">
        <a href="/dashboard" class="text-slate-300 hover:text-white">Dashboard</a>
        <a href="/api/jobs" class="text-slate-500 hover:text-slate-300">API</a>
      </div>
    </div>
  </nav>
  <main class="mx-auto max-w-6xl px-6 py-8">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
